<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>PitchIQ</title>
    <style>
        body { background: #07111f; color: white; font-family: sans-serif; margin: 0; }
        .tab-nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #0c1829; padding: 15px 0; border-top: 1px solid #222; }
        .tab { flex: 1; text-align: center; color: #666; cursor: pointer; }
        .tab.active { color: #00ff87; font-weight: bold; }
        .content { padding: 20px; display: none; }
        .content.active { display: block; }
        iframe { width: 100%; height: 80vh; border: 0; filter: invert(0.9) hue-rotate(180deg); }
        .card { background: #0f1c2e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="m-page" class="content active">
        <h2 style="color:#00ff87">Today's Matches</h2>
        <div id="match-list">Loading...</div>
    </div>

    <div id="t-page" class="content">
        <h2 style="color:#00ff87">Standings</h2>
        <div id="table-view"></div>
    </div>

    <div class="tab-nav">
        <div class="tab active" onclick="go('m-page', this)">MATCHES</div>
        <div class="tab" onclick="go('t-page', this)">TABLE</div>
    </div>

    <script>
        function go(id, el) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 't-page') document.getElementById('table-view').innerHTML = '<iframe src="https://www.sofascore.com/tournament/football/england/premier-league/17/standings/embed"></iframe>';
        }

        async function getMatches() {
            try {
                const res = await fetch('https://v3.football.api-sports.io/fixtures?date=2026-04-13&league=39&season=2025', {
                    headers: { 'x-apisports-key': '35f0bfdd839466bf99892dc805c57b94' }
                });
                const json = await res.json();
                const list = document.getElementById('match-list');
                if(!json.response.length) { list.innerHTML = "No matches today."; return; }
                list.innerHTML = json.response.map(m => `
                    <div class="card">
                        ${m.teams.home.name} ${m.goals.home ?? 0} vs ${m.goals.away ?? 0} ${m.teams.away.name}
                    </div>
                `).join('');
            } catch (e) { document.getElementById('match-list').innerHTML = "API connection failed."; }
        }
        window.onload = getMatches;
    </script>
</body>
</html>
