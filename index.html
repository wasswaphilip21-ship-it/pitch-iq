<!DOCTYPE html>
<html lang="en">
<head>
    </head>
<body>
    <script src="api.js"></script>
    <script>
        // 1. FIX: The Tab Switcher (Handles the SofaScore Table)
        window.goTab = function(tabId, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            if(el) el.classList.add('active');
            
            const target = document.getElementById(tabId);
            if(target) target.style.display = 'block';

            // When user clicks 'Table', load the reliable iframe version
            if(tabId === 'table') {
                target.innerHTML = `
                    <div style="width:100%; min-height:700px; background:var(--bg);">
                        <iframe 
                            id="sofascore-standings"
                            src="https://www.sofascore.com/tournament/football/england/premier-league/17/standings/embed" 
                            style="width:100%; height:800px; border:0; border-radius:12px; filter: invert(0.9) hue-rotate(180deg) brightness(0.8);"
                            scrolling="no">
                        </iframe>
                    </div>`;
            }
        };

        // 2. FIX: The League Switcher (Updates both Matches and Table)
        window.fT = function(leagueKey) {
            const leagueId = LEAGUE_MAP[leagueKey] || 39;
            const sofaIdMap = { 'epl': 17, 'laliga': 8, 'seriea': 23, 'bundesliga': 35, 'ligue1': 34 };
            
            // Update the Matches Feed (API-Sports)
            if(typeof fetchMatches === 'function') fetchMatches(null, leagueId);
            
            // Update the Table (SofaScore) if it exists
            const tableFrame = document.getElementById('sofascore-standings');
            if(tableFrame && sofaIdMap[leagueKey]) {
                tableFrame.src = `https://www.sofascore.com/tournament/football/league/${sofaIdMap[leagueKey]}/standings/embed`;
            }
        };
    </script>
</body>
</html>
